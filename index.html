<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCI Services</title>
  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    img {
      max-width: 320px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, textarea, button {
      font-size: 16px;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      background: #1f4f8f;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #163a69;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="bobcolor.png" alt="RCI Services">

    <form action="mailto:youremail@example.com" method="post" enctype="text/plain">
      <input type="text" name="Name" placeholder="Your Name" required>
      <input type="email" name="Email" placeholder="Your Email" required>
      <textarea name="Comments" placeholder="Comments" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</body>
</html>
